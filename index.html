<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Code Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <div class="top-nav">
        <div class="nav-left">
            <button id="hamburgerBtn" class="btn hamburger-btn" title="Menu">☰</button>
            <h1>Web Code Editor</h1>
        </div>
        <div class="nav-center">
            <div id="tabsContainer" class="tabs-container"></div>
        </div>
         <div class="nav-right">
            <button id="undoBtn" class="btn nav-btn" title="Undo">↶</button>
            <button id="redoBtn" class="btn nav-btn" title="Redo">↷</button>
            <button id="formatBtn" class="btn nav-btn" title="Format Code">🎨</button>
            <button id="previewBtn" class="btn nav-btn" title="Live Preview">👁️</button>
            <button id="themeBtn" class="btn nav-btn" title="Change Theme">🎭</button>
            <button id="importBtn" class="btn nav-btn" title="Import File">📥</button>
            <button id="exportBtn" class="btn nav-btn" title="Export File">📤</button>
            <div class="webcontainer-controls">
                <button id="webcontainerStartBtn" class="btn nav-btn" title="Start WebContainer">▶️</button>
                <button id="webcontainerStopBtn" class="btn nav-btn" title="Stop WebContainer">⏹️</button>
                <button id="webcontainerRestartBtn" class="btn nav-btn" title="Restart WebContainer">🔄</button>
                <button id="npmInstallBtn" class="btn nav-btn" title="Run npm install">📦</button>
            <button id="toggleConsoleBtn" class="btn nav-btn" title="Toggle Console">💻</button>
            </div>
        </div>
    </div>

    <div class="editor-container">
        <!-- File Explorer Panel -->
        <div class="file-explorer">
            <div class="panel-header">
                <h3>Files</h3>
                <button id="newFileBtn" class="btn">+ New File</button>
            </div>
            <div id="fileList" class="file-list"></div>
        </div>

        <!-- Editor Panel -->
        <div class="editor-panel">
            <div class="editor-header">
                <div id="fileName" class="file-name">No file open</div>
                <div class="editor-actions">
                    <button id="saveBtn" class="btn btn-primary">Save</button>
                    <button id="deleteBtn" class="btn btn-danger">Delete</button>
                </div>
            </div>
            <div id="editor" class="monaco-editor"></div>
        </div>

        <!-- Preview Panel -->
        <div id="previewPanel" class="preview-panel hidden">
            <div class="panel-header">
                <h3>Live Preview</h3>
                <button id="closePreviewBtn" class="btn">×</button>
            </div>
            <iframe id="previewFrame" class="preview-frame"></iframe>
        </div>

        <!-- Console Panel -->
        <div id="consolePanel" class="console-panel hidden">
            <div class="panel-header">
                <h3>Console</h3>
                <button id="clearConsoleBtn" class="btn">Clear</button>
                <button id="closeConsoleBtn" class="btn">×</button>
            </div>
            <div id="consoleOutput" class="console-output"></div>
            <div class="console-input">
                <input id="consoleInput" type="text" placeholder="Type JavaScript code and press Enter...">
            </div>
        </div>
    </div>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    
    <!-- WebContainer Core -->
    <script type="module">
        import { WebContainer } from 'https://cdn.jsdelivr.net/npm/@webcontainer/api@1.1.13/+esm';
        window.WebContainer = WebContainer;
    </script>
    
    <!-- Application Scripts -->
    <script src="storage.js"></script>
    <script src="files.js"></script>
    <script src="ui.js"></script>
    <script src="editor.js"></script>
    <script src="webcontainer.js"></script>
</body>
</html>
